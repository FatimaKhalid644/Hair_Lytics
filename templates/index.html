<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HairLytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Eye icon ko input field ke andar adjust karne ke liye css styling */
        .password-container {
            position: relative;
        }
        .password-container .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
            z-index: 10;
        }
        .password-container .form-control {
            padding-right: 45px;
        }
    </style>
</head>
<body>
 
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="navbar-logo"> HairLytics
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('home') }}">Home</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=about">About Us</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=features">Features</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=instructions">Instructions</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=contact">Contact Us</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=review">Feedback</a></li>
        <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=shop">Shop</a></li>
      </ul>
      <div class="d-flex auth-btns mt-2 mt-lg-0">
        <button class="btn btn-login me-2" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
        <button class="btn btn-signup" data-bs-toggle="modal" data-bs-target="#signupModal">Sign Up</button>
      </div>
    </div>
  </div>
</nav>
 
<div class="hero-full-container">
  <section class="hero-image">
    <img id="heroSlide" src="{{ url_for('static', filename='images/slide2.png') }}" alt="Hair Analysis">
  </section>
 
  <section class="hero-content-wrapper text-center">
    <div class="container">
      <div class="caption-container">
        <p id="heroCaption" class="hero-main-message">
          "Our application aims to enhance hair care practices through intelligent analysis and personalized recommendations."
        </p>
      </div>
      <a href="{{ url_for('analyze') }}" class="btn btn-primary btn-lg rounded-pill start-btn">
        Get Started
      </a>
    </div>
  </section>
</div>
 
<div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" style="color: #1F3D2B;">Login</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="loginForm">
          <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email" required>
          
          <div class="password-container mb-3">
            <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
            <i class="bi bi-eye-slash toggle-password" onclick="togglePasswordVisibility('loginPassword', this)"></i>
          </div>
          
          <button type="submit" class="btn btn-success w-100 py-2 btn-custom-green">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>
 
<div class="modal fade" id="signupModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" style="color: #1F3D2B;">Create Account</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="signupForm">
          <input type="text" id="signupName" class="form-control mb-3" placeholder="Full Name" required>
          <input type="email" id="signupEmail" class="form-control mb-3" placeholder="Email" required>
          
          <div class="password-container mb-3">
            <input type="password" id="signupPassword" class="form-control" placeholder="Password" required>
            <i class="bi bi-eye-slash toggle-password" onclick="togglePasswordVisibility('signupPassword', this)"></i>
          </div>
          
          <button type="submit" class="btn btn-success w-100 py-2 btn-custom-green">Sign Up</button>
        </form>
      </div>
    </div>
  </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRi70y3KXxoVtgSfN-ESQPZld9wj09O6U",
      authDomain: "hairlytics-b6fd1.firebaseapp.com",
      projectId: "hairlytics-b6fd1",
      storageBucket: "hairlytics-b6fd1.firebasestorage.app",
      messagingSenderId: "415155732581",
      appId: "1:415155732581:web:8e58a2cce682d0751c868c",
      measurementId: "G-2L23ZTGFLW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Signup Logical Event
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("signupName").value;
        const email = document.getElementById("signupEmail").value;
        const password = document.getElementById("signupPassword").value;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(doc(db, "users", userCredential.user.uid), {
                fullName: name,
                email: email
            });
            alert("Account Created Successfully");
        } catch(error) {
            alert(error.message);
            console.log(error);
        }
    });

    // Login Logical Event
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        try {
            await signInWithEmailAndPassword(auth, email, password);
            alert("Login Successful");
            window.location.href = "/analyze";
        } catch(error) {
            alert(error.message);
            console.log(error);
        }
    });
</script>

<script>
  // Password Hide and Show dynamically control karne ka function
  function togglePasswordVisibility(inputId, iconElement) {
    const passwordInput = document.getElementById(inputId);
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        iconElement.classList.remove("bi-eye-slash");
        iconElement.classList.add("bi-eye");
    } else {
        passwordInput.type = "password";
        iconElement.classList.remove("bi-eye");
        iconElement.classList.add("bi-eye-slash");
    }
  }

  // JavaScript Slides Carousel logic
  const slides = [
    { img: "/static/images/slide2.png", text: '"Our application aims to enhance hair care practices through intelligent analysis and personalized recommendations."' },
    { img: "/static/images/slide1.png", text: '"Taking care of your hair is not just about looking good; it\'s about nurturing yourself and embracing your natural beauty 🌸"' }
  ];
 
  let currentIndex = 0;
  const slideImg = document.getElementById("heroSlide");
  const slideText = document.getElementById("heroCaption");
 
  function updateSlide() {
    currentIndex = (currentIndex + 1) % slides.length;
    slideImg.style.opacity = "0";
    slideText.style.opacity = "0";
    setTimeout(() => {
        slideImg.src = slides[currentIndex].img;
        slideText.innerText = slides[currentIndex].text;
        slideImg.style.opacity = "1";
        slideText.style.opacity = "1";
    }, 600);
  }
  setInterval(updateSlide, 8000); 
</script>
 
</body>
</html>
