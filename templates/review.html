<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>User Review - HairLytics</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
   <style>
       @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
 
       body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8f9fa; 
            color: #333; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
       }
 
       /* Compact Navbar - Matching other pages */
       .navbar {
            background: #1F3D2B;
            padding: 5px 0 !important;
            min-height: 50px;
       }
 
       .navbar-brand {
            font-weight: 800;
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            color: #fff !important;
            text-decoration: none;
       }
 
       .navbar-logo {
            background: white;
            border-radius: 50%;
            padding: 2px;
            width: 35px;
            height: 35px;
            margin-right: 12px;
            object-fit: contain;
       }
 
       /* Navbar Link Effects (Animated Underline & Bold) */
       .navbar-nav .nav-link {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7) !important;
            padding-top: 5px !important;
            padding-bottom: 5px !important;
            position: relative; 
            transition: all 0.3s ease;
            text-decoration: none;
       }
 
       /* Underline Animation */
       .navbar-nav .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 50%;
            background-color: #ffffff;
            transition: all 0.3s ease-in-out;
            transform: translateX(-50%);
       }
 
       /* Hover & Active State: Bold + Underline Expansion */
       .navbar-nav .nav-link:hover,
       .navbar-nav .nav-link.active {
            color: #fff !important;
            font-weight: 700; 
       }
 
       .navbar-nav .nav-link:hover::after,
       .navbar-nav .nav-link.active::after {
            width: 80%; 
       }
 
       /* Content Layout */
       .main-content {
            flex: 1;
            display: flex;
            align-items: center; 
            justify-content: center;
            padding: 20px;
       }
 
       .review-container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.02);
       }
 
       /* Star Rating Styling */
       .star-rating {
            direction: rtl;
            display: inline-block;
            margin-bottom: 5px;
       }
       .star-rating input { display: none; }
       .star-rating label {
            color: #e0e0e0;
            font-size: 2.8rem;
            padding: 0 4px;
            cursor: pointer;
            transition: color 0.2s ease-in-out;
       }
       .star-rating label:hover,
       .star-rating label:hover ~ label,
       .star-rating input:checked ~ label {
            color: #FFB800; 
       }
 
       /* Animation for Expressions */
       #rating-expression {
            font-weight: 800;
            font-size: 1.1rem;
            height: 30px;
            margin-bottom: 15px;
            text-transform: uppercase;
            opacity: 0;
       }
 
       .bounce-in {
            animation: bounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
       }
 
       @keyframes bounce {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
       }
 
       /* Button Styling */
       .btn-submit {
            background-color: #1F3D2B;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s ease;
       }
       .btn-submit:hover:not(:disabled) {
            background-color: #162d1f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(31, 61, 43, 0.2);
       }
 
       .status-msg { display: none; margin-top: 15px; border-radius: 10px; font-weight: 500; }
       
       textarea.form-control:focus {
            border-color: #1F3D2B;
            box-shadow: 0 0 0 0.25rem rgba(31, 61, 43, 0.1);
       }
   </style>
</head>
<body>
 
   <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
     <div class="container">
       <a class="navbar-brand" href="{{ url_for('home') }}">
         <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="navbar-logo" onerror="this.style.display='none'">
         <span>HairLytics</span>
       </a>
       
       <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
         <span class="navbar-toggler-icon"></span>
       </button>
 
       <div class="collapse navbar-collapse" id="navbarNav">
         <ul class="navbar-nav mx-auto">
           <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('home') }}">Home</a></li>
           <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=about">About Us</a></li>
           <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=features">Features</a></li>
           <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=instructions">Instructions</a></li>
           <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=contact">Contact Us</a></li>
           <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=review">Feedback</a></li>
           <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}">Analyze</a></li>
         </ul>
       </div>
     </div>
   </nav>
 
   <div class="main-content">
       <div class="review-container text-center">
            <div class="mb-4">
                <h2 class="fw-bold" style="color: #1F3D2B; letter-spacing: -0.5px;">Share Your Experience</h2>
                <p class="text-muted">How would you rate our hair analysis service?</p>
            </div>
 
            <form id="reviewForm" onsubmit="event.preventDefault(); submitReview();">
                <div class="mb-2">
                    <div class="star-rating">
                        <input type="radio" name="stars" id="star5" value="5" onchange="updateExpression(5)"><label for="star5">★</label>
                        <input type="radio" name="stars" id="star4" value="4" onchange="updateExpression(4)"><label for="star4">★</label>
                        <input type="radio" name="stars" id="star3" value="3" onchange="updateExpression(3)"><label for="star3">★</label>
                        <input type="radio" name="stars" id="star2" value="2" onchange="updateExpression(2)"><label for="star2">★</label>
                        <input type="radio" name="stars" id="star1" value="1" onchange="updateExpression(1)"><label for="star1">★</label>
                    </div>
                    <div id="rating-expression"></div>
                </div>
 
                <div class="mb-4">
                    <textarea class="form-control" id="userFeedback" rows="3" placeholder="Tell us more about your experience (optional)..." style="border-radius: 12px; background: #fafafa;"></textarea>
                </div>
 
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span id="btnText">Submit Feedback</span>
                    <div id="loader" class="spinner-border spinner-border-sm ms-2" style="display:none;" role="status"></div>
                </button>
 
                <div id="successMsg" class="alert alert-success border-0 status-msg">
                    <i class="bi bi-check-circle-fill me-2"></i> Thank you! Feedback submitted.
                </div>
                <div id="errorMsg" class="alert alert-danger border-0 status-msg">
                    <i class="bi bi-exclamation-circle-fill me-2"></i> <span id="errorText">Please select a star rating.</span>
                </div>
            </form>
       </div>
   </div>
 
   <script>
       function updateExpression(val) {
            const expDiv = document.getElementById('rating-expression');
            const expressions = {
                1: { text: "😫 Awful", color: "#d9534f" },      
                2: { text: "😟 Poor", color: "#f0ad4e" },       
                3: { text: "😐 Average", color: "#5bc0de" },    
                4: { text: "😊 Good", color: "#5cb85c" },       
                5: { text: "🤩 Excellent!", color: "#1F3D2B" }  
            };
            
            expDiv.classList.remove('bounce-in');
            void expDiv.offsetWidth; 
            expDiv.innerHTML = expressions[val].text;
            expDiv.style.color = expressions[val].color;
            expDiv.classList.add('bounce-in');
       }
   </script>

   <script type="module">
       import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
       import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBRi70y3KXxoVtgSfN-ESQPZld9wj09O6U",
  authDomain: "hairlytics-b6fd1.firebaseapp.com",
  projectId: "hairlytics-b6fd1",
  storageBucket: "hairlytics-b6fd1.firebasestorage.app",
  messagingSenderId: "415155732581",
  appId: "1:415155732581:web:8e58a2cce682d0751c868c",
  measurementId: "G-2L23ZTGFLW"
};

       const app = initializeApp(firebaseConfig);
       const db = getFirestore(app);

       window.submitReview = async function() {
           const stars = document.querySelector('input[name="stars"]:checked');
           const feedbackText = document.getElementById('userFeedback').value;

           const btnText = document.getElementById('btnText');
           const loader = document.getElementById('loader');
           const successMsg = document.getElementById('successMsg');
           const errorMsg = document.getElementById('errorMsg');
           const errorText = document.getElementById('errorText');
           const submitBtn = document.getElementById('submitBtn');

           successMsg.style.display = 'none';
           errorMsg.style.display = 'none';

           if (!stars) {
               errorText.textContent = "Please select a star rating.";
               errorMsg.style.display = 'block';
               return;
           }

           btnText.textContent = 'Submitting...';
           loader.style.display = 'inline-block';
           submitBtn.disabled = true;

           try {
               await addDoc(collection(db, "feedback"), {
                   rating: parseInt(stars.value),
                   comment: feedbackText,
                   createdAt: new Date()
               });

               loader.style.display = 'none';
               btnText.textContent = 'Submitted!';
               successMsg.style.display = 'block';

               setTimeout(() => {
                   document.getElementById('reviewForm').reset();
                   document.getElementById('rating-expression').innerHTML = "";

                   btnText.textContent = 'Submit Feedback';
                   successMsg.style.display = 'none';
                   submitBtn.disabled = false;
               }, 2500);

           } catch(error) {
               loader.style.display = 'none';
               btnText.textContent = 'Submit Feedback';

               errorText.textContent = error.message;
               errorMsg.style.display = 'block';

               submitBtn.disabled = false;
               console.log(error);
           }
       }
   </script>

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
