<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze Hair - HairLytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-green: #1F3D2B;
            --accent-green: #2D5A3F;
            --bg-light: #F8FAF9;
            --glow-green: rgba(31, 61, 43, 0.15);
        }

        body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* --- Navbar (Standardized Styling) --- */
        .navbar {
            background: var(--primary-green) !important;
            padding: 5px 0 !important;
            min-height: 50px;
        }
        .navbar-brand { 
            font-weight: 800; 
            color: #fff !important; 
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .navbar-logo {
            background: white;
            border-radius: 50%;
            padding: 2px;
            width: 35px;
            height: 35px;
            margin-right: 12px;
            object-fit: contain;
        }
        .navbar-nav .nav-link {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7) !important;
            padding-top: 5px !important;
            padding-bottom: 5px !important;
            position: relative; 
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .navbar-nav .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 50%;
            background-color: #ffffff;
            transition: all 0.3s ease-in-out;
            transform: translateX(-50%);
        }
        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: #fff !important;
            font-weight: 700; 
        }
        .navbar-nav .nav-link:hover::after,
        .navbar-nav .nav-link.active::after {
            width: 80%; 
        }

        /* --- Layout --- */
        .analyze-card {
            max-width: 1050px; margin: 30px auto; background: #fff;
            border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            overflow: hidden; border: none;
        }

        .left-panel { background: #F1F4F2; padding: 40px; border-right: 1px solid #e0e0e0; position: sticky; top: 0; }
        .right-panel { padding: 40px 50px; max-height: 85vh; overflow-y: auto; }
        .right-panel::-webkit-scrollbar { width: 6px; }
        .right-panel::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 10px; }

        /* --- Tool Icons & Main Box --- */
        .main-display-box {
            width: 100%; height: 280px; background: #fff; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; margin-bottom: 20px; border: 2px dashed #cbd5e0; position: relative;
        }
        .preview-overlay-tools {
            position: absolute; bottom: 15px; display: flex; gap: 25px;
            background: rgba(255, 255, 255, 0.95); padding: 10px 25px;
            border-radius: 50px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); z-index: 10;
        }
        .preview-overlay-tools i, .preview-overlay-tools label { 
            font-size: 1.4rem; color: var(--primary-green); cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .preview-overlay-tools i:hover, .preview-overlay-tools label:hover { transform: scale(1.3) translateY(-5px); }

        /* Zoom CSS classes */
        .zoom-effect { cursor: zoom-in; transition: transform 0.3s ease; }
        .zoomed { transform: scale(1.5); cursor: zoom-out; z-index: 100; }

        /* --- Form Fields --- */
        .form-label { color: var(--primary-green); font-size: 0.95rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .form-label i { color: var(--accent-green); font-size: 1.1rem; }
        .form-select, .desc-box {
            border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 10px 15px;
            transition: all 0.3s ease; background-color: #fdfdfd;
        }
        .form-select:focus, .desc-box:focus-within {
            border-color: var(--primary-green); box-shadow: 0 0 0 4px var(--glow-green); background-color: #fff;
        }
        .desc-box textarea { border: none; width: 100%; outline: none; resize: none; font-size: 14px; min-height: 80px; background: transparent; }

        .btn-submit {
            background: var(--primary-green); color: #fff; border: none;
            padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; margin-top: 10px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-submit:hover { background: var(--accent-green); letter-spacing: 1px; box-shadow: 0 10px 20px rgba(31,61,43,0.2); }

        #limitPopup {
            position: fixed; top: 20px; right: -350px; background: #d9534f;
            color: white; padding: 15px 25px; border-radius: 12px; z-index: 9999; transition: 0.5s ease;
        }
        #limitPopup.show { right: 20px; }
    </style>
</head>
<body>

<div id="limitPopup">
    <i class="bi bi-exclamation-circle-fill me-2"></i> Upload Limit Reached (3/3)
</div>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('home') }}">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="navbar-logo" onerror="this.style.display='none'">
            <span>HairLytics</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('home') }}">Home</a></li>
                <li class="nav-item"><a class="nav-link px-3 active" href="{{ url_for('analyze') }}">Analyze</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=features">Features</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=about">About Us</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=review">Feedback</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('analyze') }}?page=shop">Shop</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card analyze-card">
        <div class="row g-0">
            <div class="col-md-5 left-panel">
                <div class="main-display-box" id="dropZone">
                    <div id="no-img-text" class="text-muted small">Capture or Upload Photos</div>
                    <video id="videoFeed" autoplay playsinline style="display:none; width: 100%; height: 100%; object-fit: cover;"></video>
                    <img id="mainPreview" style="display:none; width: 100%; height: 100%; object-fit: cover;">
                    
                    <div class="preview-overlay-tools">
                        <i class="bi bi-camera" id="camBtn" onclick="openCamera()" title="Take Photo"></i>
                        <i class="bi bi-camera-fill" id="captureBtn" onclick="captureImage()" title="Capture Snapshot" style="display: none; color: #d9534f;"></i>
                        <label for="fileInput" class="m-0"><i class="bi bi-paperclip" title="Attach File"></i></label>
                        <i class="bi bi-mic" onclick="startVoice()" title="Voice Input"></i>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
                </div>
                
                <div class="row g-2">
                    <div class="col-4"><div class="preview-item bg-white border rounded position-relative" id="p1" style="aspect-ratio:1; display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer;" onclick="switchMainPreview(0)"><i class="bi bi-image text-muted"></i></div></div>
                    <div class="col-4"><div class="preview-item bg-white border rounded position-relative" id="p2" style="aspect-ratio:1; display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer;" onclick="switchMainPreview(1)"><i class="bi bi-image text-muted"></i></div></div>
                    <div class="col-4"><div class="preview-item bg-white border rounded position-relative" id="p3" style="aspect-ratio:1; display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer;" onclick="switchMainPreview(2)"><i class="bi bi-image text-muted"></i></div></div>
                </div>
            </div>

            <div class="col-md-7 right-panel">
                <h3 class="fw-bold mb-4" style="color: var(--primary-green);">Detailed Hair Assessment</h3>
                <form id="analyzeForm">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-droplet-half"></i> Hair & Scalp Oil Balance</label>
                        <select class="form-select" id="oil_balance" required>
                            <option value="">Hair and Scalp Health</option>
                            <option>Very Dry</option>
                            <option>Dry</option>
                            <option>Balanced</option>
                            <option>Combination Scalp</option>
                            <option>Oily</option>
                            <option>Very Oily</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-moisture"></i> Moisture & Porosity</label>
                        <select class="form-select" id="porosity" required>
                            <option value="">Volume & Porosity</option>
                            <option>Low Volume (Low Density)</option>
                            <option>High Volume (High Density)</option>
                            <option>Medium Volume</option>
                            <option>Low Porosity (Poor absorption)</option>
                            <option>Medium Porosity (Balanced)</option>
                            <option>High Porosity (Fast moisture loss)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-shield-check"></i> Hair Strength & Damage</label>
                        <select class="form-select" id="strength" required>
                            <option value="">Hair Strength & Damage</option>
                            <option>Healthy (No damage)</option>
                            <option>Balanced</option>
                            <option>Mild Damage (Frizz/Dull)</option>
                            <option>Moderate Damage (Split ends)</option>
                            <option>Severe Damage (Breakage/Heat damage)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-graph-down-arrow"></i> Hair Fall & Growth Health</label>
                        <select class="form-select" id="hair_fall" required>
                            <option value="">Hair Fall & Growth Health</option>
                            <option>Thin Hair (Fine Strands)</option>
                            <option>Thick Hair (Coarse Strands)</option>
                            <option>Normal Shedding</option>
                            <option>Mild Hair Fall</option>
                            <option>Moderate Hair Fall</option>
                            <option>Excessive Hair Fall / Thinning</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-person-check"></i> Scalp Health & Sensitivity</label>
                        <select class="form-select" id="scalp_health" required>
                            <option value="">Scalp Health & Sensitivity</option>
                            <option>Healthy Scalp</option>
                            <option>Dandruff</option>
                            <option>Dry / Flaky Scalp</option>
                            <option>Oily / Clogged Scalp</option>
                            <option>Sensitive / Itchy Scalp</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-chat-left-text"></i> Any other concerns?</label>
                        <div class="desc-box">
                            <textarea id="concernBox" placeholder="Share your hair woes like itching, redness, or slow growth..."></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">Start Deep AI Analysis</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    let imagesArray = [];
    let stream = null;

    const fileInput = document.getElementById('fileInput');
    const mainPreview = document.getElementById('mainPreview');
    const videoFeed = document.getElementById('videoFeed');
    const noImgText = document.getElementById('no-img-text');
    const popup = document.getElementById('limitPopup');
    const camBtn = document.getElementById('camBtn');
    const captureBtn = document.getElementById('captureBtn');

    async function openCamera() {
        if (imagesArray.length >= 3) {
            showLimitPopup();
            return;
        }

        try {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }

            stream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
                audio: false
            });

            videoFeed.srcObject = stream;
            videoFeed.style.display = "block";
            mainPreview.style.display = "none";
            noImgText.style.display = "none";
            
            await videoFeed.play();

            camBtn.style.display = "none";
            captureBtn.style.display = "inline-block";

        } catch (err) {
            console.error("Camera Initializing Error: ", err);
            alert("Camera access nahi mila. Kindly browser permissions settings check karein.");
        }
    }

    function captureImage() {
        if (!stream || !videoFeed) {
            alert("Camera chalu nahi hai!");
            return;
        }

        if (imagesArray.length >= 3) {
            showLimitPopup();
            return;
        }

        const canvas = document.createElement('canvas');
        canvas.width = videoFeed.videoWidth || 640;
        canvas.height = videoFeed.videoHeight || 480;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoFeed, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL('image/jpeg', 0.95);
        imagesArray.push(imageData);

        updateGallery();
    }

    function removeImage(index, event) {
        if(event) event.stopPropagation();
        
        imagesArray.splice(index, 1);
        updateGallery();

        if (imagesArray.length === 0) {
            mainPreview.style.display = "none";
            mainPreview.classList.remove('zoomed');
            videoFeed.style.display = "none";
            noImgText.style.display = "block";
            camBtn.style.display = "inline-block";
            captureBtn.style.display = "none";
        } else {
            switchMainPreview(imagesArray.length - 1);
        }
    }

    function updateGallery() {
        for (let i = 0; i < 3; i++) {
            const gridItem = document.getElementById(`p${i + 1}`);
            if (imagesArray[i]) {
                gridItem.innerHTML = `
                    <div style="position: relative; width: 100%; height: 100%;">
                        <img src="${imagesArray[i]}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">
                        <span onclick="removeImage(${i}, event)" style="position: absolute; top: 5px; right: 5px; background: #d9534f; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; cursor: pointer; z-index: 20;">✕</span>
                    </div>
                `;
            } else {
                gridItem.innerHTML = `<i class="bi bi-image text-muted"></i>`;
            }
        }

        if (imagesArray.length >= 3) {
            showLimitPopup();
            stopCameraSystem();
            switchMainPreview(2);
        } else if (stream && videoFeed.style.display === "block") {
            camBtn.style.display = "none";
            captureBtn.style.display = "inline-block";
        } else {
            if(imagesArray.length > 0) {
                switchMainPreview(imagesArray.length - 1);
            }
        }
    }

    function switchMainPreview(index) {
        if (imagesArray[index]) {
            videoFeed.style.display = "none";
            mainPreview.src = imagesArray[index];
            mainPreview.style.display = "block";
            mainPreview.classList.add('zoom-effect');
            noImgText.style.display = "none";
            
            camBtn.style.display = "inline-block";
            captureBtn.style.display = "none";
        }
    }

    mainPreview.onclick = function() {
        this.classList.toggle('zoomed');
    };

    function stopCameraSystem() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        videoFeed.style.display = "none";
        camBtn.style.display = "inline-block";
        captureBtn.style.display = "none";
    }

    fileInput.onchange = (e) => {
        const files = Array.from(e.target.files);
        files.forEach((file) => {
            if (imagesArray.length < 3) { 
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imagesArray.push(ev.target.result);
                    updateGallery();
                };
                reader.readAsDataURL(file);
            }
        });
    };

    function showLimitPopup() {
        popup.classList.add('show');
        setTimeout(() => { popup.classList.remove('show'); }, 3000);
    }

    // --- FORM HANDLER FOR SMOOTH REDIRECTION ---
    document.getElementById('analyzeForm').onsubmit = function(e) {
        e.preventDefault();
        
        if (imagesArray.length === 0) {
            alert("Pehle pictures capture karein ya attach karein.");
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        stopCameraSystem();
        
        // Button ko simple disable karein (koi text tabdeeli nahi hogi)
        submitBtn.disabled = true;

        // Target active snapshot choose karna
        const activeSrc = mainPreview.style.display === 'block' ? mainPreview.src : imagesArray[0];

        // Form fields payload object banana
        const rawAnalysisData = {
            oil: document.getElementById("oil_balance").value,
            porosity: document.getElementById("porosity").value,
            strength: document.getElementById("strength").value,
            hairFall: document.getElementById("hair_fall").value,
            scalpInput: document.getElementById("scalp_health").value,
            concern: document.getElementById("concernBox").value.trim() || "No custom concern provided"
        };

        // Loading component pipelines ke sath compatibility maintain karne ke liye variables set karein
        localStorage.setItem("imageInTransit", activeSrc);
        localStorage.setItem("rawHairPayload", JSON.stringify(rawAnalysisData));

        // Foran validation bypass karke Jinja route redirect trigger karein
        window.location.href = "{{ url_for('loading') }}";
    };
         
    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return;
        const recognition = new SpeechRecognition();
        const concernBox = document.getElementById("concernBox");
        recognition.onresult = (e) => {
            concernBox.value += " " + e.results[0][0].transcript;
        };
        recognition.start();
    }
</script>
</body>
</html>
