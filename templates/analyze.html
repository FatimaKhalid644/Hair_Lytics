<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-green: #1F3D2B;
            --accent-green: #2D5A3F;
            --bg-light: #F8FAF9;
            --glow-green: rgba(31, 61, 43, 0.15);
        }

        body { background-color: var(--bg-light); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* --- Navbar --- */
        .navbar {
            background: var(--primary-green) !important;
            padding: 5px 0 !important;
            min-height: 50px;
        }
        .navbar-brand { 
            font-weight: 800; 
            color: #fff !important; 
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .navbar-logo {
            background: white;
            border-radius: 50%;
            padding: 2px;
            width: 35px;
            height: 35px;
            margin-right: 12px;
            object-fit: contain;
        }
        .navbar-nav .nav-link {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7) !important;
            padding-top: 5px !important;
            padding-bottom: 5px !important;
            position: relative; 
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .navbar-nav .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 50%;
            background-color: #ffffff;
            transition: all 0.3s ease-in-out;
            transform: translateX(-50%);
        }
        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: #fff !important;
            font-weight: 700; 
        }
        .navbar-nav .nav-link:hover::after,
        .navbar-nav .nav-link.active::after {
            width: 80%; 
        }

        /* --- Layout --- */
        .analyze-card {
            max-width: 1050px; margin: 30px auto; background: #fff;
            border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            overflow: hidden; border: none;
        }

        .left-panel { background: #F1F4F2; padding: 40px; border-right: 1px solid #e0e0e0; position: sticky; top: 0; }
        .right-panel { padding: 40px 50px; max-height: 85vh; overflow-y: auto; }
        .right-panel::-webkit-scrollbar { width: 6px; }
        .right-panel::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 10px; }

        /* --- Tool Icons & Main Box --- */
        .main-display-box {
            width: 100%; height: 280px; background: #fff; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; margin-bottom: 20px; border: 2px dashed #cbd5e0; position: relative;
        }
        .preview-overlay-tools {
            position: absolute; bottom: 15px; display: flex; gap: 25px;
            background: rgba(255, 255, 255, 0.95); padding: 10px 25px;
            border-radius: 50px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); z-index: 10;
        }
        .preview-overlay-tools i, .preview-overlay-tools label { 
            font-size: 1.4rem; color: var(--primary-green); cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .preview-overlay-tools i:hover, .preview-overlay-tools label:hover { transform: scale(1.3) translateY(-5px); }

        /* Zoom CSS classes */
        .zoom-effect { cursor: zoom-in; transition: transform 0.3s ease; }
        .zoomed { transform: scale(1.5); cursor: zoom-out; z-index: 100; }

        /* --- Form Fields --- */
        .form-label { color: var(--primary-green); font-size: 0.95rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .form-label i { color: var(--accent-green); font-size: 1.1rem; }
        .form-select, .desc-box {
            border: 1.5px solid #E2E8F0; border-radius: 12px; padding: 10px 15px;
            transition: all 0.3s ease; background-color: #fdfdfd;
        }
        .form-select:focus, .desc-box:focus-within {
            border-color: var(--primary-green); box-shadow: 0 0 0 4px var(--glow-green); background-color: #fff;
        }
        .desc-box textarea { border: none; width: 100%; outline: none; resize: none; font-size: 14px; min-height: 80px; background: transparent; }

        .btn-submit {
            background: var(--primary-green); color: #fff; border: none;
            padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; margin-top: 10px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-submit:hover { background: var(--accent-green); letter-spacing: 1px; box-shadow: 0 10px 20px rgba(31,61,43,0.2); }

        #limitPopup {
            position: fixed; top: 20px; right: -350px; background: #d9534f;
            color: white; padding: 15px 25px; border-radius: 12px; z-index: 9999; transition: 0.5s ease;
        }

const storage = firebase.storage();

<script>
    let imagesArray = [];
    let stream = null;

    const fileInput = document.getElementById('fileInput');
    const mainPreview = document.getElementById('mainPreview');
    const videoFeed = document.getElementById('videoFeed');
    const noImgText = document.getElementById('no-img-text');
    const popup = document.getElementById('limitPopup');
    const camBtn = document.getElementById('camBtn');
    const captureBtn = document.getElementById('captureBtn');
    const dropZone = document.getElementById('dropZone');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => e.preventDefault(), false);
    });

    async function openCamera() {
        if (imagesArray.length >= 3) {
            showLimitPopup();
            return;
        }

        try {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }

            const constraints = {
                video: {
                    width: { min: 640, ideal: 1280, max: 1920 },
                    height: { min: 480, ideal: 720, max: 1080 },
                    facingMode: "user"
                },
                audio: false
            };

            stream = await navigator.mediaDevices.getUserMedia(constraints);
            await bindAndPlayStream();

        } catch (err) {
            console.error("Primary Camera Initializing Error: ", err);
            if (err.name === "OverconstrainedError" || err.name === "ConstraintNotSatisfiedError" || err.name === "NotReadableError") {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    await bindAndPlayStream();
                    return;
                } catch (fallbackErr) {
                    console.error("Complete hardware fallback failed:", fallbackErr);
                }
            }
            alert("Camera access nahi mila. Permissions check karein.");
        }
    }

    async function bindAndPlayStream() {
        if (!stream) return;
        videoFeed.srcObject = stream;
        videoFeed.style.display = "block";
        mainPreview.style.display = "none";
        noImgText.style.display = "none";
        camBtn.style.display = "none";
        captureBtn.style.display = "inline-block";

        try {
            await videoFeed.play();
        } catch(e) {
            console.error("Playback failed:", e);
        }
    }

    function captureImage() {
        if (!stream || !videoFeed || videoFeed.paused) return;
        if (imagesArray.length >= 3) { showLimitPopup(); return; }

        const canvas = document.createElement('canvas');
        canvas.width = videoFeed.videoWidth || 640;
        canvas.height = videoFeed.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoFeed, 0, 0, canvas.width, canvas.height);

        imagesArray.push(canvas.toDataURL('image/jpeg', 0.95));
        updateGallery();
    }

    function removeImage(index, event) {
        if(event) event.stopPropagation();
        imagesArray.splice(index, 1);
        updateGallery();

        if (imagesArray.length === 0) {
            mainPreview.style.display = "none";
            mainPreview.classList.remove('zoomed');
            videoFeed.style.display = "none";
            noImgText.style.display = "block";
            camBtn.style.display = "inline-block";
            captureBtn.style.display = "none";
        } else {
            switchMainPreview(imagesArray.length - 1);
        }
    }

    function updateGallery() {
        for (let i = 0; i < 3; i++) {
            const gridItem = document.getElementById(`p${i + 1}`);
            if (imagesArray[i]) {
                gridItem.innerHTML = `
                    <div style="position: relative; width: 100%; height: 100%;">
                        <img src="${imagesArray[i]}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">
                        <span onclick="removeImage(${i}, event)" style="position: absolute; top: 5px; right: 5px; background: #d9534f; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; cursor: pointer; z-index: 20;">✕</span>
                    </div>
                `;
            } else {
                gridItem.innerHTML = `<i class="bi bi-image text-muted"></i>`;
            }
        }

        if (imagesArray.length >= 3) {
            showLimitPopup();
            stopCameraSystem();
            switchMainPreview(2);
        } else if (stream && videoFeed.style.display === "block") {
            camBtn.style.display = "none";
            captureBtn.style.display = "inline-block";
        } else if (imagesArray.length > 0) {
            switchMainPreview(imagesArray.length - 1);
        }
    }

    function switchMainPreview(index) {
        if (imagesArray[index]) {
            stopCameraSystem(); 
            videoFeed.style.display = "none";
            mainPreview.src = imagesArray[index];
            mainPreview.style.display = "block";
            mainPreview.classList.add('zoom-effect');
            noImgText.style.display = "none";
            camBtn.style.display = "inline-block";
            captureBtn.style.display = "none";
        }
    }

    mainPreview.onclick = function() { this.classList.toggle('zoomed'); };

    function stopCameraSystem() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        videoFeed.style.display = "none";
        camBtn.style.display = "inline-block";
        captureBtn.style.display = "none";
    }

    fileInput.onchange = (e) => {
        const files = Array.from(e.target.files);
        let loadedCount = 0;
        files.forEach((file) => {
            if (imagesArray.length < 3) { 
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imagesArray.push(ev.target.result);
                    loadedCount++;
                    if (loadedCount === files.length || imagesArray.length === 3) updateGallery();
                };
                reader.readAsDataURL(file);
            }
        });
    };

    function showLimitPopup() {
        popup.classList.add('show');
        setTimeout(() => { popup.classList.remove('show'); }, 3000);
    }

    // Helper to turn base64 strings into standard raw blob files for standard backend form processing
    function dataURLtoBlob(dataurl) {
        let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--){ u8arr[n] = bstr.charCodeAt(n); }
        return new Blob([u8arr], {type:mime});
    }
    document.getElementById('analyzeForm').onsubmit = async function(e) {
    e.preventDefault();
    if (imagesArray.length === 0) { alert("Pehle pictures capture karein ya attach karein."); return; }

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerText = "Analyzing Scalp Profile...";
    stopCameraSystem();

    const activeSrc = mainPreview.style.display === 'block' ? mainPreview.src : imagesArray[0];
    
    // 1. Firebase ke liye data object taiyar karein
    const firebaseData = {
        oil: document.getElementById("oil_balance").value,
        porosity: document.getElementById("porosity").value,
        strength: document.getElementById("strength").value,
        hairFall: document.getElementById("hair_fall").value,
        scalpInput: document.getElementById("scalp_health").value,
        concern: document.getElementById("concernBox").value.trim() || "No custom concern provided"
    };

    try {
        // 2. Pehle Firestore me data save hone ka intezar karein
        await db.collection("analyses").add({
            oil: firebaseData.oil,
            porosity: firebaseData.porosity,
            strength: firebaseData.strength,
            hairFall: firebaseData.hairFall,
            scalpInput: firebaseData.scalpInput,
            concern: firebaseData.concern,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        console.log("Data successfully saved to Firebase!");

    } catch (firebaseError) {
        // Agar Firebase me koi masla aaye toh console me dikhe, lekin user ka flow na tute
        console.error("Firebase save failed: ", firebaseError);
    }

    // Backend (Flask) ke liye FormData taiyar karein
    const formData = new FormData();
    formData.append("oil", firebaseData.oil);
    formData.append("porosity", firebaseData.porosity);
    formData.append("strength", firebaseData.strength);
    formData.append("hairFall", firebaseData.hairFall);
    formData.append("scalpInput", firebaseData.scalpInput);
    formData.append("concern", firebaseData.concern);
    
    imagesArray.forEach((imgBase64, index) => {
        const blobFile = dataURLtoBlob(imgBase64);
        formData.append("images", blobFile, `scalp_capture_${index}.jpg`);
    });

    localStorage.setItem("imageInTransit", activeSrc);

    // 3. Flask backend par prediction request bhejein (isay await nahi karenge taake yeh background me chalti rahe)
    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        // Agar aap loading screen par reh kar hi automatic result par jana chahti hain, 
        // toh result routing ka code loading page ke JS me hona chahiye.
        console.log("Backend process status: ", data.status);
    })
    .catch(err => {
        console.error("Backend Failure: ", err);
    });
    
    // 4. Firebase me save hote hi user ko fauran Loading screen par bhej dein
    window.location.href = "{{ url_for('loading') }}";
};
    </script>
</body>
