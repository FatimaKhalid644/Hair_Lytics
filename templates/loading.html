<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing - HairLytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-green: #1F3D2B;
            --accent-green: #2D5A3F;
            --bg-light: #F8FAF9;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }

        /* --- Navbar (Standardized Layout) --- */
        .navbar {
            background: var(--primary-green) !important;
            padding: 5px 0 !important;
            min-height: 50px;
        }
        .navbar-brand { 
            font-weight: 800; 
            color: #fff !important; 
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .navbar-logo {
            background: white;
            border-radius: 50%;
            padding: 2px;
            width: 35px;
            height: 35px;
            margin-right: 12px;
            object-fit: contain;
        }

        /* --- Processing Visuals --- */
        .processing-img { 
            width: 180px; 
            height: 180px;
            object-fit: contain;
            animation: pulse 3s infinite ease-in-out; 
        }
        
        @keyframes pulse { 
            0% { transform: scale(1); opacity: 0.9; } 
            50% { transform: scale(1.06); opacity: 1; filter: drop-shadow(0 10px 20px rgba(31,61,43,0.15)); } 
            100% { transform: scale(1); opacity: 0.9; } 
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            border-width: 0.25em;
        }
        .text-success {
            color: var(--accent-green) !important;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('home') }}">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="navbar-logo" onerror="this.style.display='none'">
            <span>HairLytics</span>
        </a>
    </div>
</nav>
 
<div class="container d-flex flex-column justify-content-center align-items-center text-center" style="min-height: 80vh;">
    <img src="{{ url_for('static', filename='images/ai.png') }}" class="processing-img mb-4" alt="AI Engine" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103807.png'">
    
    <div class="spinner-border text-success mb-4" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    
    <h4 class="fw-bold mb-2" style="color: var(--primary-green);">Analyzing your hair structure...</h4>
    <p class="text-muted fs-6">Our AI engine is crafting a diagnostic breakdown for you 😉</p>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
    const base64Image = localStorage.getItem("imageInTransit");
    const rawPayload = localStorage.getItem("rawHairPayload");
    
    if(!base64Image) {
        window.location.href = "{{ url_for('analyze') }}";
        return;
    }

    // Dynamic status text changer taake user bore na ho aur timeline pata chale
    const statusText = document.querySelector("h4.fw-bold");
    const statusSteps = [
        "Uploading diagnostic assets...",
        "Scanning scalp surface markers...",
        "Evaluating hair density & follicles...",
        "Generating personalized roadmap..."
    ];
    let stepIndex = 0;
    const intervalId = setInterval(() => {
        if(stepIndex < statusSteps.length) {
            statusText.innerText = statusSteps[stepIndex];
            stepIndex++;
        }
    }, 4000); // Har 4 seconds baad message change hoga

    const parsedPayload = rawPayload ? JSON.parse(rawPayload) : {};

    fetch(base64Image)
    .then(res => res.blob())
    .then(blob => {
        const formData = new FormData();
        formData.append("image", blob, "scalp_shot.jpg");
        
        formData.append("oil", parsedPayload.oil || "");
        formData.append("porosity", parsedPayload.porosity || "");
        formData.append("strength", parsedPayload.strength || "");
        formData.append("hairFall", parsedPayload.hairFall || "");
        formData.append("scalpInput", parsedPayload.scalpInput || "");
        formData.append("concern", parsedPayload.concern || "");

        return fetch('/predict', {
            method: 'POST',
            body: formData
        });
    })
    .then(response => response.json())
    .then(data => {
        clearInterval(intervalId); // Stop intervals
        if (data.status === "success" || data.oil_balance) {
            const finalResultBundle = {
                oil: data.oil_balance || parsedPayload.oil,
                porosity: data.porosity || parsedPayload.porosity,
                strength: data.strength || parsedPayload.strength,
                hairFall: data.hair_fall || parsedPayload.hairFall,
                scalpInput: data.scalp_health || parsedPayload.scalpInput,
                concern: parsedPayload.concern,
                image: base64Image,
                ai_report: data.ai_report || "Analysis validation complete."
            };

            localStorage.setItem("userHairData", JSON.stringify(finalResultBundle));
            localStorage.removeItem("imageInTransit");
            localStorage.removeItem("rawHairPayload");

            window.location.href = "{{ url_for('result') }}";
        } else {
            alert("Analysis Error: " + (data.message || "Invalid server response."));
            window.location.href = "{{ url_for('analyze') }}";
        }
    })
    .catch(err => {
        clearInterval(intervalId);
        console.error("Pipeline failure:", err);
        alert("Something went wrong during the analysis pipeline.");
        window.location.href = "{{ url_for('analyze') }}";
    });
});
</script>
</body>
</html>
